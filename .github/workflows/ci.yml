name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install

    - name: Run Type Check
      run: npm run lint

    - name: Run Biome Code Checking
      run: npx biome check .

    - name: Run Tests
      run: npm run test

    - name: Build Modules
      run: npm run build
